<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Egg Clicker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fffdf4;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    #score-num {
      font-size: 32px;
      font-weight: bold;
      transition: transform 0.1s;
    }
    #score-num.pop { transform: scale(1.25); }

    #progress-bar-wrap {
      width: 260px;
      height: 8px;
      background: #eee;
      border-radius: 8px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #c6a84b;
      border-radius: 8px;
      width: 0%;
      transition: width 0.15s ease;
    }

    #egg-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      outline: none;
      transition: transform 0.08s;
    }
    #egg-btn:active { transform: scale(0.93); }

    #egg-svg {
      filter: drop-shadow(0 4px 12px rgba(198,168,75,0.3));
      transition: filter 0.15s;
    }
    #egg-btn:hover #egg-svg {
      filter: drop-shadow(0 6px 18px rgba(198,168,75,0.5));
    }

    #click-hint {
      font-size: 13px;
      color: #888;
    }

    #egg-area {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .float-anim {
      position: absolute;
      pointer-events: none;
      font-size: 16px;
      font-weight: bold;
      color: #c6a84b;
      animation: floatUp 0.7s ease forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }

    #secret-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      text-align: center;
      animation: fadeIn 0.5s ease;
      max-width: 320px;
      width: 100%;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #secret-title {
      font-size: 18px;
      font-weight: bold;
    }
    #secret-code {
      font-size: 28px;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 4px;
      color: #c6a84b;
      background: #fdf6e3;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      border: 1px solid #e0c97a;
    }
    #secret-sub { font-size: 13px; color: #888; }

    #reset-btn {
      font-size: 13px;
      color: #555;
      background: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 6px 16px;
      cursor: pointer;
    }
    #reset-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>

<div id="app">

  <div id="score-display">
    <span id="score-num">0</span>
    <span style="font-size:16px; color:#888;"> / 999</span>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <div id="egg-area">
    <button id="egg-btn" title="Clique sur l'œuf !">
      <svg id="egg-svg" width="160" height="190" viewBox="0 0 160 190" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="eggGrad" cx="38%" cy="32%" r="65%">
            <stop offset="0%"   stop-color="#FFF8E7"/>
            <stop offset="40%"  stop-color="#F5E6B0"/>
            <stop offset="100%" stop-color="#C9A53A"/>
          </radialGradient>
          <radialGradient id="eggShadow" cx="50%" cy="85%" r="45%">
            <stop offset="0%"   stop-color="#8B6914" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="shine" cx="36%" cy="26%" r="28%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.72"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="80" cy="175" rx="48" ry="9" fill="url(#eggShadow)"/>
        <ellipse cx="80" cy="90"  rx="58" ry="78" fill="url(#eggGrad)" stroke="#C9A53A" stroke-width="1"/>
        <ellipse cx="80" cy="90"  rx="58" ry="78" fill="url(#shine)"/>
        <ellipse cx="57" cy="58"  rx="12" ry="7"  fill="#ffffff" fill-opacity="0.38" transform="rotate(-28,57,58)"/>
      </svg>
    </button>
  </div>

  <div id="click-hint">Clique sur l'œuf pour gagner des points !</div>

  <div id="secret-overlay">
    <div style="font-size:36px;">🎉</div>
    <div id="secret-title">Félicitations ! Tu as atteint 999 points !</div>
    <div id="secret-code">5FD68VBF</div>
    <div id="secret-sub">Voici ton message secret. Bien joué !</div>
    <button id="reset-btn" onclick="resetGame()">Recommencer</button>
  </div>

</div>

<script>
  let score = 0;
  const MAX = 999;
  const scoreNum     = document.getElementById('score-num');
  const progressBar  = document.getElementById('progress-bar');
  const eggBtn       = document.getElementById('egg-btn');
  const secretOverlay= document.getElementById('secret-overlay');
  const clickHint    = document.getElementById('click-hint');
  const eggArea      = document.getElementById('egg-area');

  eggBtn.addEventListener('click', function(e) {
    if (score >= MAX) return;
    score++;
    scoreNum.textContent = score;
    progressBar.style.width = Math.round((score / MAX) * 100) + '%';

    scoreNum.classList.remove('pop');
    void scoreNum.offsetWidth;
    scoreNum.classList.add('pop');

    const float = document.createElement('div');
    float.className = 'float-anim';
    float.textContent = '+1';
    float.style.left = (e.offsetX || 70) + 'px';
    float.style.top  = (e.offsetY || 90) + 'px';
    eggArea.appendChild(float);
    setTimeout(() => float.remove(), 700);

    if (score >= MAX) {
      setTimeout(showSecret, 400);
    }
  });

  function showSecret() {
    eggBtn.style.display  = 'none';
    clickHint.style.display = 'none';
    secretOverlay.style.display = 'flex';
  }

  function resetGame() {
    score = 0;
    scoreNum.textContent = '0';
    progressBar.style.width = '0%';
    secretOverlay.style.display = 'none';
    eggBtn.style.display  = '';
    clickHint.style.display = '';
  }
</script>

</body>
</html>
